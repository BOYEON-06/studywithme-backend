spring.application.name=StudyWithMe

# =====================================================================
# Redis 및 분산 세션(Spring Session Redis) 설정
# =====================================================================
# 본인의 Redis 서버 IP (로컬 테스트 시 localhost, 외부 서버 분산 테스트 시 해당 IP 입력)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# 세션 저장소를 인메모리(서버 내부)가 아닌 Redis 외부에 통합
spring.session.store-type=redis
spring.session.redis.namespace=spring:session
spring.session.timeout=30m

# =====================================================================
# Supabase DB 연동
# =====================================================================
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=postgres
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================================================================
# Google Gemini API 설정
# =====================================================================
google.ai.api.key=${GEMINI_API_KEY}

# =====================================================================
# JPA/Hibernate 설정
# =====================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 연관된 엔티티를 조회할 때 지정된 개수만큼 IN 절로 묶어서 가져옴 (N+1 문제 완화 및 성능 최적화)
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# =====================================================================
# 서버 및 세션 쿠키 설정
# =====================================================================
server.port=9090
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true

# 서버 재시작 시 톰캣 자체의 세션 저장을 하지 않도록 설정 (Redis 세션을 쓰므로 의미 없어짐)
server.servlet.session.persistent=false