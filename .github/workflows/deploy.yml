name: Backend CD

on:
  push:
    branches:
      - Server

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Remove plain.jar
        run: rm -f build/libs/*-plain.jar

      - name: Deploy to Backend Servers
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP_1 }},${{ secrets.SERVER_IP_2 }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/libs/*.jar"
          target: "/home/${{ secrets.SERVER_USER }}/app/backend"
          strip_components: 2

      - name: Restart Application on ALL Servers
        uses: appleboy/ssh-action@master
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          DB_PW: ${{ secrets.SUPABASE_DB_PASSWORD }}
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          host: ${{ secrets.SERVER_IP_1 }},${{ secrets.SERVER_IP_2 }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_URL, DB_PW, GEMINI_KEY
          script: |
            sudo fuser -k -9 9090/tcp || true
            sleep 2
            export SUPABASE_DB_URL=$DB_URL
            export SUPABASE_DB_PASSWORD=$DB_PW
            export GEMINI_API_KEY=$GEMINI_KEY
            nohup java -jar /home/coj2025403/app/backend/*.jar --server.port=9090 --server.address=0.0.0.0 > /home/coj2025403/app/backend/nohup.out 2>&1 &
