name: Backend CD (Server Branch)

on:
  push:
    branches: [ "Server" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew clean build -x test

    - name: Remove plain.jar
      run: rm -f build/libs/*-plain.jar

    - name: Deploy to Backend Servers
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_IP_1 }},${{ secrets.SERVER_IP_2 }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "build/libs/*.jar"
        target: "/home/${{ secrets.SERVER_USER }}/app/backend"
        strip_components: 2

    - name: Restart Application
      uses: appleboy/ssh-action@master
      env:
        DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        DB_PW: ${{ secrets.SUPABASE_DB_PASSWORD }}
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
      with:
        host: ${{ secrets.SERVER_IP_1 }},${{ secrets.SERVER_IP_2 }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        envs: DB_URL, DB_PW, GEMINI_KEY
        script: |
          # 1. 기존 9090 포트 프로세스 종료
          sudo fuser -k 9090/tcp || true
          
          # 2. 전송된 파일 위치 확인 및 정리
          sleep 2
          if [ -d "/home/coj2025403/app/backend/build/libs" ]; then
              # 꺼내기 전에 하위 폴더 밖(backend/)에 남아있던 구버전 jar들만 제거
              rm -f /home/coj2025403/app/backend/*.jar
              
              # 새 jar 파일을 상위 폴더로 이동
              mv /home/coj2025403/app/backend/build/libs/*.jar /home/coj2025403/app/backend/
              
              # 임시 build 폴더 삭제
              rm -rf /home/coj2025403/app/backend/build
          else
              echo "Warning: build/libs directory not found. Check scp-action transfer paths."
          fi
          
          export SUPABASE_DB_URL=$DB_URL
          export SUPABASE_DB_PASSWORD=$DB_PW
          export GEMINI_API_KEY=$GEMINI_KEY
          
          # 3. 스프링부트 재실행
          nohup java -jar /home/coj2025403/app/backend/*.jar --server.port=9090 --server.address=0.0.0.0 > /home/coj2025403/app/backend/nohup.out 2>&1 &
