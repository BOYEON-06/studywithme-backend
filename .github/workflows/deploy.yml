name: Backend CD (Server Branch)

on:
  push:
    branches: [ "Server" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew clean build -x test

    - name: Deploy to Backend Servers
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_IP_1 }},${{ secrets.SERVER_IP_2 }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "build/libs/*.jar"
        target: "/home/${{ secrets.SERVER_USER }}/app/backend"
        strip_components: 2

    - name: Restart Application
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP_1 }},${{ secrets.SERVER_IP_2 }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          sudo fuser -k 9090/tcp || true
          nohup java -jar /home/${{ secrets.SERVER_USER }}/app/backend/nohup.out 2>&1 &
